<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>You've been invited to {{businessName}}</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@600&family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f5f0f5;
        font-family:
          'Roboto',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #1a1523;
        -webkit-font-smoothing: antialiased;
      }

      .wrapper {
        width: 100%;
        padding: 40px 16px;
        background-color: #f5f0f5;
      }

      .container {
        max-width: 520px;
        margin: 0 auto;
        background-color: #ffffff;
        border: 1px solid #e8e0e8;
      }

      .header {
        padding: 32px 40px 28px;
        border-bottom: 1px solid #e8e0e8;
      }

      .logo {
        font-family: 'Fira Code', 'Roboto', monospace;
        font-size: 18px;
        font-weight: 600;
        color: #1a1523;
        letter-spacing: -0.02em;
        text-decoration: none;
      }

      .logo span {
        color: #4f46e5;
      }

      .body {
        padding: 40px 40px 44px;
      }

      .greeting {
        font-size: 22px;
        font-weight: 600;
        color: #1a1523;
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }

      .intro {
        color: #6b6075;
        font-size: 14px;
        margin-bottom: 32px;
        line-height: 1.7;
      }

      .btn {
        display: inline-block;
        background-color: #4f46e5;
        color: #eef2ff !important;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        padding: 11px 28px;
        letter-spacing: 0.01em;
      }

      .footer {
        padding: 20px 40px 28px;
        border-top: 1px solid #e8e0e8;
      }

      .footer-text {
        font-size: 12px;
        color: #6b6075;
        line-height: 1.6;
      }

      @media only screen and (max-width: 560px) {
        .header,
        .body,
        .footer {
          padding-left: 24px;
          padding-right: 24px;
        }
        .greeting {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="container">
        <div class="header">
          <span class="logo">Pikslots</span>
        </div>

        <div class="body">
          <p class="greeting">Hi {{firstName}},</p>
          <p class="intro">
            You've been invited to join <strong>{{businessName}}</strong> on
            Pikslots. Click the button below to accept your invitation and get
            started.
          </p>
          <a href="{{acceptUrl}}" class="btn">Start you journey</a>
        </div>

        <div class="footer">
          <p class="footer-text">
            © 2026 Pikslots. All rights reserved.<br />
            If you didn't expect this email, you can safely ignore it.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
